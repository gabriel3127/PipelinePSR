<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redefinir Senha — PSR Pipeline</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;padding:20px}
    .card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:36px;width:100%;max-width:420px;box-shadow:0 32px 64px rgba(0,0,0,0.4)}
    .logo{text-align:center;margin-bottom:28px}
    .logo-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);padding:10px 20px;border-radius:12px}
    .logo-text{color:#e2e8f0;font-size:17px;font-weight:700;letter-spacing:-0.5px}
    h2{color:#f1f5f9;font-size:21px;font-weight:700;margin-bottom:8px}
    p.sub{color:#64748b;font-size:13px;margin-bottom:24px}
    label{color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px}
    input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 14px;color:#f1f5f9;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;transition:border-color 0.2s;margin-bottom:16px}
    input:focus{border-color:#6366f1}
    .btn{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
    .msg.error{background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444}
    .msg.success{background:rgba(16,185,129,0.1);border:1px solid #10b981;color:#10b981}
    .back{text-align:center;margin-top:18px;font-size:13px;color:#6366f1;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-badge">
        <span style="font-size:22px">📦</span>
        <span class="logo-text">PSR | GALPÃO Pipeline</span>
      </div>
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:10px">🔑</div>
      <h2>Definir nova senha</h2>
      <p class="sub">Escolha uma senha segura para sua conta</p>
    </div>
    <div id="msg" style="display:none" class="msg"></div>
    <label>Nova senha</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
    <label>Confirmar senha</label>
    <input type="password" id="confirm" placeholder="Repita a senha" />
    <button class="btn" id="btn" onclick="handleReset()">Salvar nova senha</button>
    <div class="back" onclick="window.location='/'">← Voltar ao login</div>
  </div>

  <script>
    const { createClient } = supabase;
    const client = createClient(
      'https://gyeccsjrwtrzdxbexanu.supabase.co',
      'sb_publishable_gHmfyDFR4m5LUVgiM4yofg_ZYgw9QRa'
    );

    // Detecta o token no hash da URL
    client.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        console.log('Pronto para redefinir senha');
      }
    });

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('btn');

      if (!password) return showMsg('Digite a nova senha','error');
      if (password.length < 6) return showMsg('Mínimo 6 caracteres','error');
      if (password !== confirm) return showMsg('Senhas não coincidem','error');

      btn.disabled = true;
      btn.textContent = 'Salvando...';

      const { error } = await client.auth.updateUser({ password });
      if (error) {
        showMsg(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
        return;
      }

      showMsg('Senha definida com sucesso! Redirecionando...','success');
      setTimeout(() => { window.location.href = '/'; }, 2500);
    }
  </script>
</body>
</html>
